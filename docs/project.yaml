---
version: "2.0"

project:
  name: ai-config
  description: >
    Ansible-managed multi-agent AI development environment for Claude Code.
    Deploys 60+ agents, 25+ skills, MCP servers, RAG infrastructure (Qdrant),
    design tools (OpenPencil), task management (Beads), and orchestration (Gastown)
    globally via ~/.claude symlink.
  type: infrastructure
  repository: https://github.com/ZeiZel/ai-config

tech_stack:
  provisioning: ansible
  shell: zsh
  terminal: ghostty
  editor: neovim
  package_manager: homebrew
  dotfiles_manager: stow
  container_runtime: docker
  python_tooling: uv
  js_runtime: bun
  ai_tools:
    - claude-code
    - aider
    - repomix
    - beads
    - gastown
    - ccusage

infrastructure:
  qdrant:
    image: "qdrant/qdrant:v1.13.2"
    port_rest: 6333
    port_grpc: 6334
    memory_limit: "1g"
    restart_policy: "unless-stopped"
    binding: "127.0.0.1"
    collection:
      name: codebase
      vector_size: 384
      distance: cosine
      quantization: int8
      hybrid_search: true  # BM25 sparse vectors
  mcp_servers:
    - name: qdrant-mcp
      scope: user
      transport: stdio
      package: mcp-server-qdrant
      runner: uvx
    - name: code-index-mcp
      scope: user
      transport: stdio
      package: code-index-mcp
      runner: uvx
    - name: context7
      scope: user
      transport: http
      url: https://mcp.context7.com/mcp
    - name: mem0
      scope: user
      transport: stdio
      package: mem0-mcp
      runner: uvx
    - name: open-pencil
      scope: user
      transport: stdio
      package: "@open-pencil/mcp"
      runner: npx

agents:
  total_count: 60
  categories:
    spec-agents: 8
    frontend: 5
    backend: 1
    devops: 3
    security: 2
    data: 2
    documentation: 5
    research: 4
    orchestration: 3
    dev-tools: 6
    everyday: 5
    domain: 3
    ui-ux: 2
    mobile: 1
    ai: 1
    product: 2
    quality: 1
    architecture: 1
    analysis: 1
    utility: 2

skills:
  total_count: 25
  categories:
    development: [teamlead, implement, debug, refactor, test, commit]
    quality: [pr-review, security-audit, audit, simplify]
    research: [research, design, decide, docs, learn]
    project: [project-setup, onboard, changelog, readme, migrate]
    domain: [backend-dev, devops, ai-product-dev, analytics, system-design]
    agent-system: [agent-creator, agent-workflow, directives, update-ai, find-skills]
    internal: [beads-tasks, gastown-orchestrate, rag-context, repomix-snapshot, team-comms, code-search]

context:
  strategy: auto  # auto | repomix | rag
  threshold_tokens: 700000
  snapshot_path: docs/context/codebase-snapshot.txt
  layers:
    always: 5000  # tokens: project overview, architecture, standards
    task_specific: 40000  # tokens: relevant module code, tests, APIs
    on_demand: unlimited  # lazy: RAG self-service

quality:
  target_score: 95
  max_iterations: 3
  mandatory_agents:
    - spec-reviewer
    - security-architect
    - spec-tester

orchestration:
  sub_orchestrators:
    senior-frontend-architect:
      domain: frontend
      manages: [react-developer, vue-frontend-engineer, angular-frontend-engineer, open-pencil-designer]
      max_concurrent: 4
    senior-backend-architect:
      domain: backend
      manages: [database-architect, api-designer, realtime-specialist, search-specialist, payments-specialist]
      max_concurrent: 4
    senior-devops-architect:
      domain: devops
      manages: [deployment-engineer, devops-troubleshooter]
      max_concurrent: 2
    security-architect:
      domain: security
      manages: [compliance-officer]
      max_concurrent: 2
  blocker_resolution:
    max_auto_attempts: 2
    always_escalate: [NEEDS_CLARIFICATION]
  spawn_limits:
    team_lead_max_concurrent: 10
    sub_orchestrator_max_concurrent: 4
    max_nesting_depth: 3

model_routing:
  opus:
    - team-lead
    - spec-analyst
    - spec-architect
    - spec-planner
    - agile-master
  sonnet:
    - spec-developer
    - spec-tester
    - spec-reviewer
    - spec-validator
    - security-architect
    - senior-backend-architect
    - senior-frontend-architect
    - senior-devops-architect
    - front-lead
    - react-developer
    - angular-frontend-engineer
    - vue-frontend-engineer
    - open-pencil-designer
    - database-architect
    - api-designer
    - realtime-specialist
    - search-specialist
    - payments-specialist
    - deployment-engineer
    - devops-troubleshooter
    - compliance-officer
    - architecture-keeper
    - release-manager
    - technical-writer
    - api-documenter
    - mobile-developer
    - data-engineer
    - ml-engineer
    - performance-engineer
    - code-reviewer
    - data-analyst
    - web-researcher
    - competitor-analyst
    - trend-watcher
    - docs-collector
    - growth-engineer
    - dependency-auditor
    - refactor-agent
    - migration-assistant
    - spec-orchestrator
    - git-historian
    - sql-optimizer
    - ui-ux-master
    - product-manager
  haiku:
    - changelog-keeper
    - boilerplate-generator
    - regex-helper
    - readme-generator

workflow_templates:
  feature:
    phases: [analyst, architect, agile-master, dev, review, test, validate]
    quality: 95
  bugfix:
    phases: [dev, review, test]
    quality: 90
  hotfix:
    phases: [dev, test]
    quality: 85
  refactor:
    phases: [architect, dev, review, test]
    quality: 95
  docs:
    phases: [writer, architecture-keeper]
    quality: review
  prototype:
    phases: [architect, dev]
    quality: 75

rag:
  enabled: false
  collection: codebase
  embedding_model: paraphrase-multilingual-MiniLM-L12-v2
  embedding_dim: 384
  qdrant_port: 6333

hooks:
  session_start: "bd prime"
  pre_compact: "bd prime"
  post_write: "auto-lint (eslint/ruff)"
  pre_bash: "safety guard (rm -rf, force-push)"
  notification: "OS notification"
  stop: "TTS + session logging"
