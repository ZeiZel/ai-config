---
name: dotfiles
description: Ansible-based macOS/Linux developer environment provisioning with multi-agent AI system

tech_stack:
  provisioning: ansible
  shell: zsh
  terminal: ghostty
  editor: neovim
  package_manager: homebrew
  dotfiles_manager: stow
  ai_tools:
    - claude-code
    - aider
    - repomix

context:
  strategy: auto  # auto | repomix | rag
  threshold_tokens: 700000
  snapshot_path: docs/context/codebase-snapshot.txt

quality:
  target_score: 95
  max_iterations: 3
  mandatory_agents:
    - spec-reviewer
    - security-architect
    - spec-tester

orchestration:
  sub_orchestrators:
    senior-frontend-architect:
      domain: frontend
      manages: [react-developer, vue-frontend-engineer, angular-frontend-engineer, open-pencil-designer]
      max_concurrent: 4
    senior-backend-architect:
      domain: backend
      manages: [database-architect, api-designer, realtime-specialist, search-specialist, payments-specialist]
      max_concurrent: 4
    senior-devops-architect:
      domain: devops
      manages: [deployment-engineer, devops-troubleshooter]
      max_concurrent: 2
    security-architect:
      domain: security
      manages: [compliance-officer]
      max_concurrent: 2
  blocker_resolution:
    max_auto_attempts: 2
    always_escalate: [NEEDS_CLARIFICATION]
  spawn_limits:
    team_lead_max_concurrent: 10
    sub_orchestrator_max_concurrent: 4
    max_nesting_depth: 3

model_routing:
  opus:
    - team-lead
    - spec-architect
    - spec-reviewer
    - security-architect
    - senior-backend-architect
    - senior-frontend-architect
    - senior-devops-architect
  sonnet:
    - spec-developer
    - spec-tester
    - spec-planner
    - spec-analyst
    - spec-validator
    - agile-master
    - front-lead
    - react-developer
    - angular-frontend-engineer
    - vue-frontend-engineer
    - open-pencil-designer
    - database-architect
    - api-designer
    - realtime-specialist
    - search-specialist
    - payments-specialist
    - deployment-engineer
    - devops-troubleshooter
    - compliance-officer
    - architecture-keeper
    - release-manager
    - technical-writer
    - api-documenter
    - mobile-developer
    - data-engineer
    - ml-engineer
    - performance-engineer
    - code-reviewer
    - data-analyst
    - web-researcher
    - competitor-analyst
    - trend-watcher
    - docs-collector
    - growth-engineer
    - dependency-auditor
    - refactor-agent
    - migration-assistant
    - spec-orchestrator
    - git-historian
    - sql-optimizer
    - ui-ux-master
    - product-manager
    - devops-troubleshooter
  haiku:
    - changelog-keeper
    - boilerplate-generator
    - regex-helper
    - readme-generator

workflow_templates:
  feature:
    phases: [analyst, architect, agile-master, dev, review, test, validate]
    quality: 95
  bugfix:
    phases: [dev, review, test]
    quality: 90
  hotfix:
    phases: [dev, test]
    quality: 85
  refactor:
    phases: [architect, dev, review, test]
    quality: 95
  docs:
    phases: [writer, architecture-keeper]
    quality: review
  prototype:
    phases: [architect, dev]
    quality: 75

rag:
  enabled: false
  collection: codebase
  embedding_model: paraphrase-multilingual-MiniLM-L12-v2
  embedding_dim: 384
  qdrant_port: 6333
