---
# Qdrant Vector Database
qdrant_enabled: true
qdrant_image: "qdrant/qdrant"
# Pin to current stable for deterministic builds
qdrant_tag: "v1.13.2"
qdrant_container_name: "qdrant"
qdrant_port_rest: 6333
qdrant_port_grpc: 6334
qdrant_data_dir: "{{ dotfiles_home }}/.local/share/qdrant/storage"
qdrant_snapshots_dir: "{{ dotfiles_home }}/.local/share/qdrant/snapshots"
qdrant_memory_limit: "1g"
qdrant_restart_policy: "unless-stopped"

# Qdrant collection (mmap mode)
qdrant_collection_name: "codebase"
qdrant_vector_size: 384
qdrant_distance: "Cosine"

# Hybrid search: BM25 sparse vectors alongside dense
# Enables keyword+semantic fusion for 20-40% better retrieval
qdrant_hybrid_search_enabled: true

# Qdrant MCP Server
qdrant_mcp_enabled: true
qdrant_mcp_package: "mcp-server-qdrant"
# Default: multilingual model for RU/EN projects (same 384 dims, drop-in replacement)
# Options:
#   sentence-transformers/all-MiniLM-L6-v2 — EN only, fastest
#   sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2 — 50+ languages, 384 dims
#   nomic-embed-text-v1.5 — best quality, 768 dims (requires collection recreation)
qdrant_mcp_embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
qdrant_mcp_url: "http://localhost:{{ qdrant_port_rest }}"

# Code-Index-MCP
code_index_mcp_enabled: true
code_index_mcp_package: "code-index-mcp"

# Context7 MCP - live library documentation in LLM context
# #1 MCP server by usage, eliminates hallucinated APIs
context7_mcp_enabled: true
context7_mcp_url: "https://mcp.context7.com/mcp"

# Mem0 - structured agent memory (episodic/semantic/procedural)
# 26% accuracy boost over flat vector search
# Package: mem0-mcp-server (PyPI) — requires MEM0_API_KEY from https://app.mem0.ai
# Alternative: OpenMemory (self-hosted) — see mem0ai/mem0/openmemory
mem0_enabled: true
mem0_package: "mem0-mcp-server"
mem0_data_dir: "{{ dotfiles_home }}/.local/share/mem0"

# OpenPencil - open-source Figma alternative with AI MCP
open_pencil_enabled: true
open_pencil_cli_package: "@open-pencil/cli"
open_pencil_mcp_package: "@open-pencil/mcp"

# Paths
uv_bin: "{{ dotfiles_home }}/.local/bin/uv"
uvx_bin: "{{ dotfiles_home }}/.local/bin/uvx"
npx_bin: "npx"
claude_bin: "{{ dotfiles_home }}/.local/bin/claude"
claude_mcp_scope: "user"
docker_path: "/usr/local/bin:/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"

# ccusage - Claude Code usage tracking & statusline
ccusage_enabled: true
