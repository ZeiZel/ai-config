---
- name: Configure | Skip if Claude not installed
  ansible.builtin.debug:
    msg: "Claude Code not found, skipping MCP configuration"
  when: not (claude_stat.stat.exists | default(false))

- name: Configure | MCP server setup
  when: claude_stat.stat.exists | default(false)
  block:
    - name: Configure | List existing MCP servers
      ansible.builtin.command:
        cmd: "{{ claude_bin }} mcp list"
      register: mcp_list
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Configure | Remove existing qdrant-mcp
      ansible.builtin.command:
        cmd: "{{ claude_bin }} mcp remove --scope {{ claude_mcp_scope }} qdrant-mcp"
      when: "'qdrant-mcp' in mcp_list.stdout"
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Configure | Add Qdrant MCP Server
      ansible.builtin.shell:
        cmd: >
          {{ claude_bin }} mcp add-json
          --scope {{ claude_mcp_scope }}
          qdrant-mcp
          '{{ qdrant_mcp_config | to_json }}'
      vars:
        qdrant_mcp_config:
          type: stdio
          command: "{{ uvx_bin }}"
          args:
            - mcp-server-qdrant
          env:
            QDRANT_URL: "{{ qdrant_mcp_url }}"
            COLLECTION_NAME: "{{ qdrant_collection_name }}"
            EMBEDDING_MODEL: "{{ qdrant_mcp_embedding_model }}"
      when: qdrant_mcp_enabled
      register: qdrant_mcp_add
      changed_when: qdrant_mcp_add.rc == 0
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Configure | Remove existing code-index-mcp
      ansible.builtin.command:
        cmd: "{{ claude_bin }} mcp remove --scope {{ claude_mcp_scope }} code-index-mcp"
      when: "'code-index-mcp' in mcp_list.stdout"
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Configure | Add Code-Index-MCP
      ansible.builtin.shell:
        cmd: >
          {{ claude_bin }} mcp add-json
          --scope {{ claude_mcp_scope }}
          code-index-mcp
          '{{ code_index_mcp_config | to_json }}'
      vars:
        code_index_mcp_config:
          type: stdio
          command: "{{ uvx_bin }}"
          args:
            - code-index-mcp
      when: code_index_mcp_enabled
      register: code_index_mcp_add
      changed_when: code_index_mcp_add.rc == 0
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    # Context7 MCP - live library documentation
    - name: Configure | Remove existing context7
      ansible.builtin.command:
        cmd: "{{ claude_bin }} mcp remove --scope {{ claude_mcp_scope }} context7"
      when: "'context7' in mcp_list.stdout"
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Configure | Add Context7 MCP Server
      ansible.builtin.command:
        cmd: >
          {{ claude_bin }} mcp add
          --scope {{ claude_mcp_scope }}
          --transport http
          context7
          {{ context7_mcp_url }}
      when: context7_mcp_enabled
      register: context7_mcp_add
      changed_when: context7_mcp_add.rc == 0
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    # Mem0 MCP - structured agent memory
    - name: Configure | Remove existing mem0
      ansible.builtin.command:
        cmd: "{{ claude_bin }} mcp remove --scope {{ claude_mcp_scope }} mem0"
      when: "'mem0' in mcp_list.stdout"
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Configure | Add Mem0 MCP Server
      ansible.builtin.shell:
        cmd: >
          {{ claude_bin }} mcp add-json
          --scope {{ claude_mcp_scope }}
          mem0
          '{{ mem0_mcp_config | to_json }}'
      vars:
        mem0_mcp_config:
          type: stdio
          command: "{{ uvx_bin }}"
          args:
            - "--from"
            - "{{ mem0_package }}"
            - mem0-mcp-server
      when: mem0_enabled
      register: mem0_mcp_add
      changed_when: mem0_mcp_add.rc == 0
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    # OpenPencil MCP - design tool with AI
    - name: Configure | Remove existing open-pencil
      ansible.builtin.command:
        cmd: "{{ claude_bin }} mcp remove --scope {{ claude_mcp_scope }} open-pencil"
      when: open_pencil_enabled and ('open-pencil' in mcp_list.stdout)
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Configure | Add OpenPencil MCP Server
      ansible.builtin.shell:
        cmd: >
          {{ claude_bin }} mcp add-json
          --scope {{ claude_mcp_scope }}
          open-pencil
          '{{ open_pencil_mcp_config | to_json }}'
      vars:
        open_pencil_mcp_config:
          type: stdio
          command: "{{ dotfiles_home }}/.bun/bin/bunx"
          args:
            - openpencil-mcp
      when: open_pencil_enabled
      register: open_pencil_mcp_add
      changed_when: open_pencil_mcp_add.rc == 0
      failed_when: false
      environment:
        PATH: "{{ dotfiles_home }}/.bun/bin:{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
