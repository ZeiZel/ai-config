---
# Pre-cache: run --help to trigger uvx package download
- name: MCP Servers | Pre-cache Qdrant MCP Server via uvx
  ansible.builtin.command:
    cmd: "{{ uvx_bin }} --from {{ qdrant_mcp_package }} mcp-server-qdrant --help"
  register: qdrant_mcp_install
  changed_when: false
  failed_when: false
  when: qdrant_mcp_enabled
  environment:
    PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

# Pre-cache: run --help to trigger uvx package download
- name: MCP Servers | Pre-cache Code-Index-MCP via uvx
  ansible.builtin.command:
    cmd: "{{ uvx_bin }} --from {{ code_index_mcp_package }} code-index-mcp --help"
  register: code_index_mcp_install
  changed_when: false
  failed_when: false
  when: code_index_mcp_enabled
  environment:
    PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: MCP Servers | Pre-download FastEmbed model
  ansible.builtin.command:
    cmd: >
      {{ uv_bin }} run --with fastembed python -c
      "from fastembed import TextEmbedding; TextEmbedding(model_name='{{ qdrant_mcp_embedding_model }}'); print('Model ready')"
  register: fastembed_download
  changed_when: false
  failed_when: false
  when: qdrant_mcp_enabled
  environment:
    PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

# Mem0 - structured agent memory
- name: MCP Servers | Pre-cache Mem0 MCP via uvx
  ansible.builtin.command:
    cmd: "{{ uvx_bin }} --from {{ mem0_package }} mem0-mcp-server --help"
  register: mem0_mcp_install
  changed_when: false
  failed_when: false
  when: mem0_enabled
  environment:
    PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: MCP Servers | Create Mem0 data directory
  ansible.builtin.file:
    path: "{{ mem0_data_dir }}"
    state: directory
    mode: "0755"
  when: mem0_enabled

# Docfork - MIT library documentation (alternative to Context7)
- name: MCP Servers | Pre-cache Docfork via npx
  ansible.builtin.command:
    cmd: "{{ npx_bin }} -y {{ docfork_package }} --help"
  register: docfork_install
  changed_when: false
  failed_when: false
  when: docfork_enabled
  environment:
    PATH: "{{ dotfiles_home }}/.bun/bin:{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

# Tree-sitter MCP - AST-aware code analysis
- name: MCP Servers | Pre-cache Tree-sitter MCP via uvx
  ansible.builtin.command:
    cmd: "{{ uvx_bin }} --from {{ tree_sitter_mcp_package }} mcp-server-tree-sitter --help"
  register: tree_sitter_install
  changed_when: false
  failed_when: false
  when: tree_sitter_mcp_enabled
  environment:
    PATH: "{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

# Claude Context MCP (Zilliz) - hybrid code search
- name: MCP Servers | Pre-cache Claude Context MCP via npx
  ansible.builtin.command:
    cmd: "{{ npx_bin }} -y {{ claude_context_mcp_package }} --help"
  register: claude_context_install
  changed_when: false
  failed_when: false
  when: claude_context_mcp_enabled
  environment:
    PATH: "{{ dotfiles_home }}/.bun/bin:{{ dotfiles_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
