name: Claude Scheduled Audit

on:
  schedule:
    # Weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Claude Agent Audit
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          direct_prompt: |
            Audit the AI agent system in this repository:

            1. Check agent specs in .claude/agents/ for completeness:
               - Frontmatter fields (name, category, tools, skills)
               - Constitution reference
               - Communication protocol
               - Code examples presence

            2. Check for consistency:
               - Model routing in docs/project.yaml matches agent specs
               - Sub-orchestrator manages lists are up to date
               - Constitution.md role boundaries match actual agents

            3. Check for outdated references:
               - Framework versions in code examples
               - MCP server package names
               - Tool versions

            Create a GitHub issue with the audit results titled
            "Weekly AI System Audit - [date]" with findings and recommendations.
