name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          direct_prompt: |
            Review this PR for:
            1. Code quality and best practices
            2. Security vulnerabilities (OWASP Top 10)
            3. Performance anti-patterns
            4. Ansible task idempotency (if .yml files changed)
            5. Agent spec completeness (if .claude/agents/ files changed)

            Reference docs/Constitution.md for agent role boundaries.
            Reference docs/quality-gates.yaml for quality thresholds.

            Be concise. Focus on actionable issues only.
